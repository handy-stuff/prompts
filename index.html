<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Prompts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🤖 My AI Prompt Library</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search prompts by title or text...">
        </div>
    </header>

    <div class="layout-wrapper">
        <!-- STATIC LEFT SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Categories</h3>
                <p class="sidebar-hint">Select one or multiple</p>
            </div>
            <div id="category-list" class="category-list">
                <!-- Checkboxes will be generated here by JavaScript -->
            </div>
        </aside>

        <!-- MAIN PROMPT GRID -->
        <main>
            <div id="prompt-count" class="prompt-count"></div>
            
            <div id="prompt-grid" class="grid-container">
                <p>Loading prompts...</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
