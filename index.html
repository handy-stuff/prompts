<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Prompts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🤖 My AI Prompt Library</h1>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search prompts...">
            <select id="categoryFilter">
                <option value="All">All Categories</option>
                <!-- Categories will be added here automatically -->
            </select>
        </div>
    </header>

    <main>
        <div id="prompt-grid" class="grid-container">
            <p>Loading prompts...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
